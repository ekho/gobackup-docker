name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      REF_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test gate
        run: go test ./...
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
      - name: Set up buildx (container driver for multi-platform)
        run: docker buildx create --use --name multiarch --driver docker-container
      - name: Build and push (linux/amd64, linux/arm64)
        run: |
          image=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')  # GHCR requires lowercase
          ver="${REF_TAG#v}"                                    # v2.2.45 -> 2.2.45

          # A clean X.Y.Z release also moves the minor, major and latest tags
          # (v2.2.45 -> 2.2.45, 2.2, 2, latest). A pre-release (e.g. v2.2.0-rc1)
          # publishes only its exact version, so it never hijacks the moving tags.
          if [[ "$ver" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            tags=("$ver" "${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" "${BASH_REMATCH[1]}" "latest")
          else
            tags=("$ver")
          fi

          args=()
          for t in "${tags[@]}"; do args+=(-t "$image:$t"); done
          echo "Publishing tags: ${tags[*]}"
          docker buildx build --platform linux/amd64,linux/arm64 "${args[@]}" --push .
